<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山口電鉄 〜やまぐち名産の旅〜</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .game-cell {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>山口電鉄 〜やまぐち名産の旅〜</h1>
    <div class="game-board">
        <div class="game-cell">1</div>
        <div class="game-cell">2</div>
        <div class="game-cell">3</div>
        <div class="game-cell">4</div>
        <div class="game-cell">5</div>
        <div class="game-cell">6</div>
        <div class="game-cell">7</div>
        <div class="game-cell">8</div>
        <div class="game-cell">9</div>
    </div>
    <script>
        // Simple game logic goes here
        document.querySelectorAll('.game-cell').forEach(cell => {
            cell.addEventListener('click', () => {
                cell.style.backgroundColor = '#e74c3c';
                cell.textContent = 'Clicked!';
            });
        });
    </script>
</body>
</html>
